
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
     <script src="./gestion_event/gesture-detector.js"></script>
    <script src="./gestion_event/gesture-handler.js"></script>
  </head>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./src/targets.mind; filterMinCF:0.1; filterBeta: 10; maxTrack: 2" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
       gesture-detector
        id="scene"
      >
      <a-assets>
            <img id="card" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.png" />
            <a-asset-item id="koutoubia" src="./stylized_mosque/scene.gltf"></a-asset-item>
             <a-asset-item id="tree-obj" src="./bab dokala/remparts+5-1-1.obj"></a-asset-item>
              <a-asset-item id="tree-mtl" src="./bab dokala/remparts+5-1-1..mtl"></a-asset-item>
        </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
      
      <a-entity
        gltf-model="./marrakech-tower/scene.gltf"
        scale="0.3 0.3 0.3"
       rotation="90 0 0 " position="0 0 0"
       
             class="clickable" gesture-handler
      ></a-entity>
         <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
      </a-entity>
<!--         <a-entity mindar-image-target="targetIndex: 1">
          <a-entity
        gltf-model="./stylized_mosque/scene.gltf"
        scale="0.009 0.009 0.009"
       rotation="90 0 0 " position="0 0 0"
      ></a-entity>
      </a-entity> -->
      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model rotation="90 0 0 " position="0 0 0.1" scale="0.001 0.001 0.001" src="#koutoubia"
          animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
        >
      </a-entity>
    </a-scene>
    <script>
      sceneEl.addEventListener("targetFound", event => {
      console.log("target found");
});

    </script>
  </body>
</html>

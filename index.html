    <section>
      <div class="card1">
        <h2>Scan this image to have an exeprience with AR </h2>
     
      <div class="card bg-dark text-black">
        
        <img src="Maps.jpg" class="card-img" alt="..." border="0">
        
        <div class="card-img-overlay">
          <h5 class="card-title">Map Marrakech</h5>
          <p class="card-text">This is a screenshot from the Marrakech Map, which we utilized to implement the Augmented Reality (AR) feature. You need to scan this screen to engage in the AR experience</p>
          
      </div>

       <button type="button" class="btn btn-secondary" onclick="downloadImage()">Download this image</button>

    <script>
      function downloadImage() {
        // Récupérer l'URL de l'image
        var imageUrl = document.querySelector('.card-img').src;
          console.log(imageUrl);
        // Créer un élément <a> pour simuler le téléchargement
        var downloadLink = document.createElement('a');
        downloadLink.href = imageUrl;
        downloadLink.download = 'Maps.jpg';
  
        // Ajouter l'élément <a> à la page
        document.body.appendChild(downloadLink);
  
        // Simuler le clic sur le lien de téléchargement
        downloadLink.click();
  
        // Supprimer l'élément <a> de la page
        document.body.removeChild(downloadLink);
      }
    </script>
